<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Bullion P2P 贷款监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e4e7ed; color: #1a1a2e; }
header { background: #fff; border-bottom: 1px solid #d0d4de; padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 17px; font-weight: 700; color: #b8860b; }
header .sub { font-size: 11px; color: #777; margin-top: 2px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.updated { font-size: 11px; color: #888; }
.countdown { font-size: 11px; color: #777; }
.countdown span { color: #b8860b; font-weight: 600; font-variant-numeric: tabular-nums; }
.refresh-btn { padding: 5px 14px; border: 1px solid #b8860b; background: #fff; color: #b8860b; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
.refresh-btn:hover { background: #b8860b; color: #fff; }
.stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px 24px 0; }
.stat-card { background: #fff; border: 1px solid #d0d4de; border-radius: 8px; padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .label { font-size: 11px; color: #777; margin-bottom: 3px; }
.stat-card .value { font-size: 20px; font-weight: 700; }
.stat-card .sub-value { font-size: 11px; color: #777; margin-top: 2px; }
.sgd { color: #e03131; } .usd { color: #2f9e44; } .eur { color: #1971c2; }
.workspace { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px 24px 24px; align-items: start; }
.tools-panel { background: #fff; border: 1px solid #d0d4de; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
.tool-tabs { display: flex; border-bottom: 1px solid #d0d4de; }
.tool-tab { flex: 1; padding: 10px 6px; border: none; background: #f5f6f9; color: #777; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.tool-tab.active { background: #fff; color: #b8860b; box-shadow: inset 0 -2px 0 #b8860b; }
.tool-tab:hover:not(.active) { color: #b8860b; background: #fff; }
.tool-body { padding: 16px; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 11px; color: #777; font-weight: 600; }
.field select, .field input[type=number], .field input[type=date] { padding: 8px 10px; border: 1px solid #d0d5e0; border-radius: 6px; font-size: 13px; color: #333; background: #fafbfc; outline: none; width: 100%; }
.field select:focus, .field input:focus { border-color: #b8860b; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.calc-btn { width: 100%; padding: 9px; background: #b8860b; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
.calc-btn:hover { background: #9a700a; }
.result-box { margin-top: 14px; display: none; }
.result-box.show { display: block; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.r-item { background: #f5f6f9; border-radius: 7px; padding: 10px 12px; }
.r-item .rl { font-size: 10px; color: #777; margin-bottom: 3px; }
.r-item .rv { font-size: 16px; font-weight: 700; color: #333; }
.r-item.hi { background: #fff8e6; border: 1px solid #f0d080; }
.r-item.hi .rv { color: #b8860b; }
.r-item.green { background: #f0f7f0; border: 1px solid #b2d8b2; }
.r-item.green .rv { color: #27ae60; }
.result-summary { margin-top: 10px; background: #f0f7f0; border: 1px solid #b2d8b2; border-radius: 7px; padding: 12px; }
.result-summary .rs-label { font-size: 11px; color: #555; margin-bottom: 8px; font-weight: 600; }
.result-summary .rs-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.rs-col .rsl { font-size: 10px; color: #777; }
.rs-col .rsv { font-size: 15px; font-weight: 700; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge.active { background: #e6f4ea; color: #27ae60; }
.badge.done { background: #f0f0f0; color: #777; }
/* Benchmark */
.bench-source-block { background: #f5f6f9; border: 1px solid #e0e2e8; border-radius: 7px; padding: 10px 12px; margin-bottom: 12px; font-size: 11px; }
.bench-source-block .bsb-cur { font-weight: 700; color: #333; margin-bottom: 4px; }
.bench-source-block .bsb-src { color: #777; margin-bottom: 6px; }
.bench-source-block .bsb-rates { display: flex; gap: 8px; flex-wrap: wrap; }
.bsb-rate { background: #fff; border: 1px solid #d0d4de; border-radius: 5px; padding: 4px 8px; }
.bsb-rate .bsr-dur { font-size: 10px; color: #777; }
.bsb-rate .bsr-val { font-size: 13px; font-weight: 700; color: #333; }
.bench-matrix { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
.bench-matrix th { background: #f5f6f9; color: #777; font-weight: 600; padding: 7px 5px; text-align: center; border: 1px solid #e0e2e8; font-size: 11px; }
.bench-matrix td { padding: 5px 4px; border: 1px solid #e0e2e8; text-align: center; }
.bench-matrix td:first-child { font-weight: 700; background: #f5f6f9; color: #555; font-size: 11px; }
.bench-matrix input[type=number] { width: 58px; padding: 5px 4px; border: 1px solid #d0d5e0; border-radius: 4px; font-size: 12px; text-align: center; background: #fafbfc; outline: none; }
.bench-matrix input[type=number]:focus { border-color: #b8860b; }
.bench-matrix input.auto-filled { background: #f0f7f0; border-color: #b2d8b2; color: #27ae60; }
.bench-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
.bench-table th { background: #f5f6f9; color: #777; font-weight: 600; padding: 7px 8px; border: 1px solid #e0e2e8; font-size: 11px; }
.bench-table td { padding: 7px 8px; border: 1px solid #e0e2e8; text-align: center; font-size: 12px; }
.bench-table td:first-child { text-align: left; font-weight: 600; }
.spread-pos { color: #27ae60; font-weight: 700; }
.spread-pos::before { content: '\25B2 '; font-size: 9px; }
.spread-neg { color: #e03131; font-weight: 700; }
.spread-neg::before { content: '\25BC '; font-size: 9px; }
.spread-zero { color: #777; }
.bench-hint { font-size: 11px; color: #777; line-height: 1.6; margin-bottom: 12px; }
.auto-tag { display: inline-block; font-size: 9px; background: #e6f4ea; color: #27ae60; border-radius: 3px; padding: 1px 4px; font-weight: 600; vertical-align: middle; margin-left: 3px; }
/* Charts */
.charts-panel { display: flex; flex-direction: column; gap: 14px; }
.chart-filters { background: #fff; border: 1px solid #d0d4de; border-radius: 10px; padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.chart-filters span.filter-label { font-size: 12px; color: #555; font-weight: 600; }
.filter-group { display: flex; gap: 6px; align-items: center; padding: 3px 6px; background: #f5f6f9; border-radius: 22px; border: 1px solid #e0e2e8; }
.filter-btn { padding: 5px 13px; border: 1px solid transparent; background: transparent; color: #555; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.filter-btn.active { background: #b8860b; color: #fff; border-color: #b8860b; font-weight: 600; }
.filter-btn:hover:not(.active) { border-color: #b8860b; color: #b8860b; }
.cur-btn { padding: 5px 12px; border: 1px solid transparent; background: transparent; color: #777; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; }
.cur-btn.active { color: #fff; border-color: transparent; font-weight: 700; }
.cur-btn.active.sgd { background: #e03131; }
.cur-btn.active.usd { background: #2f9e44; }
.cur-btn.active.eur { background: #1971c2; }
.cur-btn.active.all { background: #555; }
.cur-btn:hover:not(.active) { border-color: #b8860b; color: #b8860b; }
.toggle-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.toggle-wrap label { font-size: 12px; color: #555; cursor: pointer; user-select: none; }
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: .2s; }
.toggle-slider:before { content:''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider { background: #27ae60; }
.toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: #fff; border: 1px solid #d0d4de; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
.card h2 { font-size: 11px; color: #777; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.chart-wrap { position: relative; height: 260px; }
/* Recent trades table */
.recent-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.recent-table th { background: #f5f6f9; color: #777; font-weight: 600; padding: 6px 8px; border-bottom: 2px solid #d0d4de; text-align: left; font-size: 11px; position: sticky; top: 0; }
.recent-table td { padding: 6px 8px; border-bottom: 1px solid #eef0f4; }
.recent-table tr:hover { background: #f9fafb; }
.recent-table .rate-col { text-align: right; font-weight: 700; }
.recent-table .vol-col { text-align: right; font-variant-numeric: tabular-nums; }
.recent-table .net-col { text-align: right; color: #27ae60; font-weight: 600; }
.recent-table .dur-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #f0f0f0; color: #666; }
.recent-wrap { max-height: 360px; overflow-y: auto; border: 1px solid #e0e2e8; border-radius: 6px; }
.recent-summary { font-size: 11px; color: #777; margin-bottom: 10px; }
.recent-summary strong { color: #333; }
.pager-btn { padding: 4px 12px; border: 1px solid #d0d5e0; background: #fff; color: #555; border-radius: 4px; cursor: pointer; font-size: 11px; }
.pager-btn:hover { border-color: #b8860b; color: #b8860b; }
.pager-btn:disabled { opacity: 0.4; cursor: default; }
.pager-info { font-size: 11px; color: #777; }
/* Loading */
.loading-overlay { position: fixed; inset: 0; background: #e4e7ed; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-overlay.hidden { display: none; }
.spinner { width: 36px; height: 36px; border: 3px solid #d0d4de; border-top-color: #b8860b; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #777; }
.loading-error { text-align: center; }
.loading-error p { font-size: 13px; color: #e03131; margin-bottom: 8px; }
.loading-error small { font-size: 11px; color: #777; }
.chart-loading { position: absolute; inset: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 2; border-radius: 10px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.chart-loading.active { opacity: 1; pointer-events: auto; }
/* Data gaps notice */
.gaps-notice { background: #fff8e6; border: 1px solid #f0d080; border-radius: 6px; padding: 8px 16px; margin: 8px 24px 0; font-size: 11px; color: #8a6d00; }
.gaps-notice strong { font-weight: 700; }
/* Responsive */
@media (max-width: 1100px) { .workspace { grid-template-columns: 1fr; } }
@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) {
  .stats-strip { grid-template-columns: 1fr; }
  header { flex-wrap: wrap; padding: 12px 16px; }
  .header-right { width: 100%; justify-content: flex-end; margin-top: 6px; }
  .workspace { padding: 12px 16px 16px; }
  .chart-filters { gap: 6px; }
  .filter-group { flex-wrap: wrap; }
  .gaps-notice { margin: 8px 16px 0; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">正在加载市场数据...</div>
</div>

<header>
  <div>
    <h1>Silver Bullion P2P 贷款市场监控</h1>
    <div class="sub" id="headerSub">数据来源: silverbullion.com.sg</div>
  </div>
  <div class="header-right">
    <div class="updated" id="updatedAt"></div>
    <div class="countdown">下次刷新: <span id="countdown">4:00:00</span></div>
    <button class="refresh-btn" onclick="location.reload()" title="重新加载页面，倒计时将重置">刷新数据</button>
  </div>
</header>

<div id="gapsNotice"></div>
<div class="stats-strip" id="stats"></div>

<div class="workspace">
  <div class="tools-panel">
    <div class="tool-tabs">
      <button class="tool-tab active" data-tool="recent">近期成交</button>
      <button class="tool-tab" data-tool="estimator">利率估算</button>
      <button class="tool-tab" data-tool="history">订单回顾</button>
      <button class="tool-tab" data-tool="benchmark">基准对比</button>
    </div>

    <div class="tool-body" id="toolRecent">
      <div class="field"><label>期限</label>
        <select id="recentDur"><option value="all">全部</option><option value="1 Month">1M</option><option value="6 Month">6M</option><option value="12 Month">12M</option><option value="24 Month">24M</option></select>
      </div>
      <div id="recentTable"></div>
      <div id="recentPager" style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"></div>
    </div>

    <div class="tool-body" id="toolEstimator" style="display:none">
      <div class="field"><label>期限</label>
        <select id="estDur"><option value="1 Month">1 个月</option><option value="6 Month" selected>6 个月</option><option value="12 Month">12 个月</option><option value="24 Month">24 个月</option></select>
      </div>
      <div class="field"><label>出借金额</label><input type="text" id="estAmt" value="100,000" inputmode="decimal" /></div>
      <button class="calc-btn" onclick="calcEstimate()">开始计算</button>
      <div class="result-box" id="estResult"></div>
      <div style="font-size:12px;color:#777;margin-top:10px;display:none" id="estNodata">该条件近30天暂无成交记录。<br>试试切换其他币种或期限？</div>
    </div>

    <div class="tool-body" id="toolHistory" style="display:none">
      <div class="field"><label>期限</label>
        <select id="hisDur"><option value="1 Month">1 个月</option><option value="6 Month" selected>6 个月</option><option value="12 Month">12 个月</option><option value="24 Month">24 个月</option></select>
      </div>
      <div class="field"><label>出借金额</label><input type="text" id="hisAmt" value="100,000" inputmode="decimal" /></div>
      <div class="field"><label>出借日期</label><input type="date" id="hisDate" /></div>
      <div class="field"><label>年利率 (%)</label><input type="number" id="hisRate" placeholder="例如 5.50" min="0" step="0.1" /></div>
      <button class="calc-btn" onclick="calcHistory()">开始计算</button>
      <div class="result-box" id="hisResult"></div>
    </div>

    <div class="tool-body" id="toolBenchmark" style="display:none">
      <p class="bench-hint">绿色数字为自动获取的官方基准利率，可手动修改。点击「开始计算」查看与 P2P 净年化的利差。</p>
      <div id="benchSources"></div>
      <table class="bench-matrix">
        <thead><tr><th>币种</th><th>1M</th><th>6M</th><th>12M</th><th>24M</th></tr></thead>
        <tbody>
          <tr><td>SGD</td>
            <td><input type="number" class="bank-rate" data-cur="SGD" data-dur="1 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="SGD" data-dur="6 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="SGD" data-dur="12 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="SGD" data-dur="24 Month" step="0.01" placeholder="--" /></td>
          </tr>
          <tr><td>USD</td>
            <td><input type="number" class="bank-rate" data-cur="USD" data-dur="1 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="USD" data-dur="6 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="USD" data-dur="12 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="USD" data-dur="24 Month" step="0.01" placeholder="--" /></td>
          </tr>
          <tr><td>EUR</td>
            <td><input type="number" class="bank-rate" data-cur="EUR" data-dur="1 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="EUR" data-dur="6 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="EUR" data-dur="12 Month" step="0.01" placeholder="--" /></td>
            <td><input type="number" class="bank-rate" data-cur="EUR" data-dur="24 Month" step="0.01" placeholder="--" /></td>
          </tr>
        </tbody>
      </table>
      <button class="calc-btn" onclick="calcBenchmark()">开始计算</button>
      <div id="benchResult"></div>
    </div>
  </div>

  <div class="charts-panel">
    <div class="chart-filters">
      <span class="filter-label">币种</span>
      <div class="filter-group">
        <button class="cur-btn all" data-cur="ALL">全部</button>
        <button class="cur-btn active usd" data-cur="USD">USD</button>
        <button class="cur-btn sgd" data-cur="SGD">SGD</button>
        <button class="cur-btn eur" data-cur="EUR">EUR</button>
      </div>
      <span class="filter-label">期限</span>
      <div class="filter-group">
        <button class="filter-btn active" data-dur="all">全部</button>
        <button class="filter-btn" data-dur="1 Month">1M</button>
        <button class="filter-btn" data-dur="6 Month">6M</button>
        <button class="filter-btn" data-dur="12 Month">12M</button>
        <button class="filter-btn" data-dur="24 Month">24M</button>
      </div>
      <div class="toggle-wrap">
        <label for="netToggle">净年化</label>
        <label class="toggle"><input type="checkbox" id="netToggle" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-wrap" id="spreadToggleWrap" style="display:none">
        <label for="spreadToggle" style="color:#b8860b;font-weight:600">利差区间</label>
        <label class="toggle"><input type="checkbox" id="spreadToggle"><span class="toggle-slider" style="background:#b8860b"></span></label>
      </div>
    </div>
    <div class="charts-grid">
      <div class="card"><h2 id="ratechartTitle">平均净年化利率趋势（扣管理费）</h2><div class="chart-wrap"><canvas id="rateChart"></canvas></div></div>
      <div class="card"><h2>周成交量趋势</h2><div class="chart-wrap"><canvas id="volumeChart"></canvas></div></div>
      <div class="card" style="grid-column:1/-1"><h2 id="scatterchartTitle">净年化利率散点图（每笔交易）</h2><div class="chart-wrap" style="height:300px"><canvas id="scatterChart"></canvas></div></div>
      <div class="card" style="grid-column:1/-1"><h2 id="volscatterTitle" style="display:flex;justify-content:space-between;align-items:center"><span>历史成交规模散点图</span><div class="toggle-wrap" style="margin-left:0"><label style="font-size:11px;color:#777;font-weight:normal" for="volMedianToggle">日中位数</label><label class="toggle" style="width:30px;height:17px"><input type="checkbox" id="volMedianToggle" checked><span class="toggle-slider"></span></label></div></h2><div class="chart-wrap" style="height:300px"><canvas id="volScatterChart"></canvas></div></div>
    </div>
  </div>
</div>

<script>
const CURRENCIES = ['SGD','USD','EUR'];
const DURATIONS  = ['1 Month','6 Month','12 Month','24 Month'];
const COLORS = { SGD:'#e03131', USD:'#2f9e44', EUR:'#1971c2' };
let RAW, BENCHMARK;
let currentDur = 'all', currentCur = 'USD', showNet = true, showSpread = false, showVolMedian = true;
let rateChart, volumeChart, scatterChart, volScatterChart;

function adminFee(dur) { return dur === '1 Month' ? 1.0 : 0.5; }
function toNet(rate, dur) { return rate - adminFee(dur); }
function fmtM(n){ return n==null?'--':n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtI(n){ return n==null?'--':Math.round(n).toLocaleString('en-US'); }

// -- Data loading --
async function loadData() {
  try {
    const [rawRes, benchRes] = await Promise.all([
      fetch('data.json'),
      fetch('benchmark.json')
    ]);
    if (!rawRes.ok) throw new Error('data.json: HTTP ' + rawRes.status);
    if (!benchRes.ok) throw new Error('benchmark.json: HTTP ' + benchRes.status);
    RAW = await rawRes.json();
    BENCHMARK = await benchRes.json();
    document.getElementById('loadingOverlay').classList.add('hidden');
    initApp();
  } catch(e) {
    var overlay = document.getElementById('loadingOverlay');

    if (dur !== 'all') txs = txs.filter(function(t){ return t.duration === dur; });

    var cur = (currentCur==='ALL'?'USD':currentCur);

// -- #2: Data gaps detection --
function detectGaps() {
  var dates = RAW.transactions.map(function(t){return t.date;});
  dates = [...new Set(dates)].sort();
  var gaps = [];
  for (var i = 1; i < dates.length; i++) {
    var d1 = new Date(dates[i-1]), d2 = new Date(dates[i]);
    var diff = Math.round((d2 - d1) / 86400000);
    if (diff > 7) {
      gaps.push(dates[i-1] + ' ~ ' + dates[i] + '（' + diff + ' 天）');
    }
  }
  if (gaps.length) {
    document.getElementById('gapsNotice').innerHTML = '<div class="gaps-notice"><strong>数据间断提示：</strong>以下日期区间无成交记录 — ' + gaps.join('；') + '</div>';
  }
}

  var ra=rr.length?rr.reduce(function(s,r){return s+r;},0)/rr.length:null;
  var pct,sl,sn;
  if(amt>0){var v33=vols[Math.floor(n*0.33)],v67=vols[Math.floor(n*0.67)];if(amt>=v67){pct=0.35;sl='大额';sn='>=近30天67%分位（'+v67.toLocaleString()+'），大单优先';}else if(amt>=v33){pct=0.25;sl='中额';sn='近30天中段（'+v33.toLocaleString()+'~'+v67.toLocaleString()+'）';}else{pct=0.15;sl='小额';sn='<近30天33%分位（'+v33.toLocaleString()+'），需更低利率';}}else{pct=0.25;sl='';sn='未填金额，按中等竞争力';}
  var sr=rates[Math.floor(n*pct)], fr=adminFee(dur), nr=sr-fr, mo=parseInt(dur);
  var gr=amt>0?amt*sr/100*mo/12:null, fe=amt>0?amt*fr/100*mo/12:null, ne=gr!==null?gr-fe:null;
  box.innerHTML='<div class="result-grid"><div class="r-item hi" style="grid-column:1/-1"><div class="rl">建议利率'+(sl?'（'+sl+'）':'')+'</div><div class="rv">'+sr.toFixed(2)+'%</div><div style="font-size:10px;color:#777;margin-top:2px">'+sn+'</div></div><div class="r-item"><div class="rl">近30天均值</div><div class="rv">'+avgRate.toFixed(2)+'%</div><div style="font-size:10px;color:#777">'+n+' 笔</div></div><div class="r-item"><div class="rl">近7天均值</div><div class="rv">'+(ra!==null?ra.toFixed(2)+'%':'--')+'</div><div style="font-size:10px;color:#777">'+rr.length+' 笔</div></div><div class="r-item"><div class="rl">近30天区间</div><div class="rv" style="font-size:13px">'+rates[0].toFixed(2)+'% ~ '+rates[n-1].toFixed(2)+'%</div></div><div class="r-item green"><div class="rl">净年化收益率</div><div class="rv">'+nr.toFixed(2)+'%</div><div style="font-size:10px;color:#777">'+sr.toFixed(2)+'% - '+fr+'%</div></div></div>'+(ne!==null?'<div class="result-summary" style="margin-top:10px"><div class="rs-label">按建议利率 '+sr.toFixed(2)+'% 出借 '+amt.toLocaleString()+' '+cur+'（'+dur.replace('Month','个月').trim()+'）</div><div class="rs-grid"><div class="rs-col"><div class="rsl">毛利息</div><div class="rsv" style="color:#333">'+fmtM(gr)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">管理费（'+fr+'% p.a.）</div><div class="rsv" style="color:#c0392b">-'+fmtM(fe)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">净利息</div><div class="rsv" style="color:#27ae60">'+fmtM(ne)+' '+cur+'</div></div></div></div>':'');
  box.classList.add('show');
}

// -- Order review --
function calcHistory(){
  var cur=currentCur==='ALL'?'USD':currentCur, dur=document.getElementById('hisDur').value;
  var amt=parseFloat(document.getElementById('hisAmt').value.replace(/,/g,''))||0;
  var ds=document.getElementById('hisDate').value, rate=parseFloat(document.getElementById('hisRate').value);
  var box=document.getElementById('hisResult');
  if(!ds||!rate||!amt){box.innerHTML='<div style="font-size:12px;color:#777;margin-top:10px">请填写完整的出借信息（金额、日期、利率）</div>';box.classList.add('show');return;}
  var mo=parseInt(dur), startD=new Date(ds), endD=new Date(ds); endD.setMonth(endD.getMonth()+mo);
  var today=new Date(), isActive=endD>today, ref=isActive?today:endD;
  var held=Math.round((ref-startD)/86400000), total=Math.round((endD-startD)/86400000), fr=adminFee(dur);
  var gr=amt*rate/100*total/365, fa=amt*fr/100*total/365, ne=gr-fa;
  var gsf=amt*rate/100*held/365, fsf=amt*fr/100*held/365, nsf=gsf-fsf;
  var dl=Math.max(0,Math.round((endD-today)/86400000));
  var fmt=function(d){return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'});};
  box.innerHTML='<div class="result-grid" style="margin-bottom:10px"><div class="r-item" style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center"><div><div class="rl">订单周期</div><div class="rv" style="font-size:13px">'+fmt(startD)+' → '+fmt(endD)+'</div></div><span class="badge '+(isActive?'active':'done')+'">'+(isActive?'进行中 · 剩'+dl+'天':'已到期')+'</span></div><div class="r-item green"><div class="rl">净年化收益率</div><div class="rv">'+(rate-fr).toFixed(2)+'%</div><div style="font-size:10px;color:#777">'+rate.toFixed(2)+'% - '+fr+'%</div></div><div class="r-item hi"><div class="rl">年利率（毛）</div><div class="rv">'+rate.toFixed(2)+'%</div></div></div><div class="result-summary"><div class="rs-label">'+(isActive?'持有至今（'+held+'天）':'全期收益（'+total+'天）')+'</div><div class="rs-grid"><div class="rs-col"><div class="rsl">毛利息</div><div class="rsv" style="color:#333">'+fmtM(isActive?gsf:gr)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">管理费</div><div class="rsv" style="color:#c0392b">-'+fmtM(isActive?fsf:fa)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">净利息</div><div class="rsv" style="color:#27ae60">'+fmtM(isActive?nsf:ne)+' '+cur+'</div></div></div>'+(isActive?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid #d0e8d0"><div class="rs-label">到期预期（全期 '+total+' 天）</div><div class="rs-grid"><div class="rs-col"><div class="rsl">毛利息</div><div class="rsv" style="color:#333">'+fmtM(gr)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">管理费</div><div class="rsv" style="color:#c0392b">-'+fmtM(fa)+' '+cur+'</div></div><div class="rs-col"><div class="rsl">净利息</div><div class="rsv" style="color:#27ae60">'+fmtM(ne)+' '+cur+'</div></div></div></div>':'')+'</div>';
  box.classList.add('show');
}

// -- Benchmark comparison --
function calcBenchmark(){
  var cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  var cs=cutoff.toISOString().split('T')[0];
  var p2p={};
  CURRENCIES.forEach(function(cur){DURATIONS.forEach(function(dur){
    var sub=RAW.transactions.filter(function(t){return t.currency===cur&&t.duration===dur&&t.date>=cs;});
    if(sub.length) p2p[cur+'|'+dur]=+(sub.reduce(function(s,t){return s+t.rate;},0)/sub.length-adminFee(dur)).toFixed(2);
  });});
  var bank={};
  document.querySelectorAll('.bank-rate').forEach(function(el){if(el.value)bank[el.dataset.cur+'|'+el.dataset.dur]=parseFloat(el.value);});
  var dl={'1 Month':'1M','6 Month':'6M','12 Month':'12M','24 Month':'24M'};
  var rows='';
  CURRENCIES.forEach(function(cur){DURATIONS.forEach(function(dur){
    var key=cur+'|'+dur, p=p2p[key], b=bank[key];
    if(p===undefined&&b===undefined)return;
    var sc='<td class="spread-zero">--</td>';
    if(p!==undefined&&b!==undefined){var sp=+(p-b).toFixed(2);var cls=sp>0?'spread-pos':sp<0?'spread-neg':'spread-zero';sc='<td class="'+cls+'">'+(sp>0?'+':'')+sp.toFixed(2)+'%</td>';}
    rows+='<tr><td>'+cur+' '+dl[dur]+'</td><td>'+(p!==undefined?p.toFixed(2)+'%':'--')+'</td><td>'+(b!==undefined?b.toFixed(2)+'%':'--')+'</td>'+sc+'</tr>';
  });});
  if(!rows){document.getElementById('benchResult').innerHTML='<p style="font-size:12px;color:#777;margin-top:12px">请先填写至少一项基准利率</p>';return;}
  document.getElementById('benchResult').innerHTML='<table class="bench-table"><thead><tr><th>币种/期限</th><th>P2P净年化</th><th>基准利率</th><th>利差</th></tr></thead><tbody>'+rows+'</tbody></table><p style="font-size:10px;color:#888;margin-top:8px">利差 = P2P净年化 - 基准利率 · <span class="spread-pos" style="font-size:10px">正值</span> 表示P2P更优 · <span class="spread-neg" style="font-size:10px">负值</span> 表示基准更优</p>';
}

// -- Start --
loadData();
</script>
